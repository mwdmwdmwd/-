<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>Yumi Brick Breaker</title>
<meta name="theme-color" content="#0f172a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Yumi Breaker" />
<link rel="manifest" href="./manifest.json?v=16" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png?v=16" />
<style>
  :root{--bg:#0f172a;--bg2:#111827;--panel:#0b1220cc;--line:#ffffff24;--text:#e5eefc;--muted:#9fb1cc;--accent:#7dd3fc;--heart:#fb7185;--warn:#f59e0b;--danger:#ef4444;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  body{display:flex;justify-content:center;align-items:stretch}
  .app{position:relative;width:100%;max-width:520px;height:100vh;display:flex;flex-direction:column;padding:8px 10px calc(env(safe-area-inset-bottom) + 6px)}
  .topbar{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:start;margin-bottom:6px}
  .hud{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 10px;line-height:1.25;min-height:54px}
  .hud .row{display:flex;justify-content:space-between;gap:10px;font-weight:700;font-size:13px}
  .hud .sub{margin-top:4px;font-size:11px;color:var(--muted);min-height:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .miniBtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-weight:800}
  .miniBtn:active{transform:scale(.97)}
  .gameWrap{position:relative;flex:1;min-height:0}
  canvas{display:block;width:100%;height:100%;border-radius:18px;border:1px solid #ffffff18;background:linear-gradient(180deg,#111827 0%,#0b1220 100%);box-shadow:0 10px 30px rgba(0,0,0,.35);touch-action:none}
  .corner{position:absolute;bottom:12px;width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(6px);font-size:24px;font-weight:900;color:var(--text)}
  .corner.left{left:12px}
  .corner.right{right:12px;font-size:12px;letter-spacing:.4px}
  .corner.disabled{opacity:.35;filter:grayscale(1)}
  .overlay{position:absolute;inset:0;background:rgba(6,10,18,.68);display:none;align-items:center;justify-content:center;padding:16px;border-radius:18px}
  .overlay.show{display:flex}
  .panel{width:min(100%,460px);background:#09111ef0;border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,.45)}
  .panel h2{margin:0 0 10px;font-size:26px;text-align:center}
  .panel p{margin:8px 0;color:var(--muted);text-align:center;line-height:1.45}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
  .card{border:1px solid var(--line);border-radius:16px;padding:12px;background:#132238;min-height:146px;display:flex;flex-direction:column;gap:6px;justify-content:space-between}
  .card.off{opacity:.42;filter:grayscale(.6)}
  .cost{font-size:12px;color:#ffd1dc;font-weight:800}
  .name{font-size:18px;font-weight:900}
  .desc{font-size:12px;color:var(--muted);line-height:1.3;white-space:pre-line}
  .delta{font-size:11px;color:#cde8ff}
  .buy{padding:8px 0;border:none;border-radius:12px;font-weight:900;background:#38bdf8;color:#062339}
  .closeRow{display:flex;justify-content:center;margin-top:12px}
  .closeBtn{padding:10px 18px;border:none;border-radius:12px;font-weight:900;background:#1f2937;color:var(--text);border:1px solid var(--line)}
  .stateList{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;font-size:13px;color:#dbeafe;margin-top:8px}
  .stateList div{padding:8px 10px;background:#112033;border-radius:12px;border:1px solid #ffffff12}
  .small{font-size:11px;color:var(--muted);text-align:center;margin-top:8px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="hud" id="hudMain">
      <div class="row"><span id="scoreText">점수 0</span><span id="stageText">STAGE 1</span><span id="heartText">♥ 0</span></div>
      <div class="sub" id="coreText">코어 없음</div>
    </div>
    <button class="miniBtn" id="pauseBtn">Ⅱ</button>
    <div style="display:flex;align-items:center;justify-content:center;font-size:10px;color:#8ea3c7">v16</div>
  </div>
  <div class="gameWrap">
    <canvas id="game" width="420" height="760"></canvas>
    <button class="corner left disabled" id="shopBtn">♥</button>
    <button class="corner right" id="statusBtn">STAT</button>

    <div class="overlay show" id="startOverlay"><div class="panel"><h2>유미야 사랑해!</h2><p>탭해서 시작<br>블록 20개 제거하면 스테이지 업<br>코어는 떨어지는 아이템을 받아야 획득</p><p class="small">하트는 매 판 초기화</p></div></div>
    <div class="overlay" id="messageOverlay"><div class="panel"><h2 id="messageTitle">유미야 사랑해!</h2><p id="messageBody">탭해서 계속</p></div></div>
    <div class="overlay" id="shopOverlay"><div class="panel"><h2>상점</h2><p>카드 1장 선택 시 즉시 적용되고 게임이 계속 진행돼.</p><div class="cards" id="cards"></div><div class="closeRow"><button class="closeBtn" id="shopCloseBtn">닫기</button></div></div></div>
    <div class="overlay" id="statusOverlay"><div class="panel"><h2>상태</h2><div class="stateList" id="stateList"></div><div class="closeRow"><button class="closeBtn" id="statusCloseBtn">닫기</button></div></div></div>
  </div>
</div>
<script>
(() => {
'use strict';
const VERSION = 'v16';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const shopBtn = document.getElementById('shopBtn');
const statusBtn = document.getElementById('statusBtn');
const pauseBtn = document.getElementById('pauseBtn');
const overlays = {
  start: document.getElementById('startOverlay'),
  msg: document.getElementById('messageOverlay'),
  shop: document.getElementById('shopOverlay'),
  status: document.getElementById('statusOverlay'),
};
const messageTitle = document.getElementById('messageTitle');
const messageBody = document.getElementById('messageBody');
const scoreText = document.getElementById('scoreText');
const stageText = document.getElementById('stageText');
const heartText = document.getElementById('heartText');
const coreText = document.getElementById('coreText');
const cardsBox = document.getElementById('cards');
const stateList = document.getElementById('stateList');
document.getElementById('shopCloseBtn').onclick = () => closeShop();
document.getElementById('statusCloseBtn').onclick = () => toggleStatus(false);

const CFG = {
  cols: 8,
  brickGap: 6,
  brickH: 22,
  topMargin: 58,
  side: 8,
  paddleY: H - 84,
  basePaddleW: 78,
  basePaddleH: 12,
  ballR: 7,
  coreDropChance: 0.017,
  coreDropVy: 1.9,
  heartEveryRows: 5,
  coreMaxLv: 10,
  coreLineInterval: 7000,
  bossDebuffInterval: 2000,
};
CFG.brickW = (W - CFG.side * 2 - CFG.brickGap * (CFG.cols - 1)) / CFG.cols;
CFG.rowPitch = CFG.brickH + CFG.brickGap;

let state;

function resetState() {
  state = {
    running: false,
    paused: false,
    gameOver: false,
    gameOverPhase: 0,
    score: 0,
    stage: 1,
    killsInStage: 0,
    destroyedTotal: 0,
    rowsAdded: 0,
    hearts: 0,
    heartsSinceShop: 0,
    shopReady: false,
    coreLevels: { triangle: 0, long: 0, vlight: 0, hlight: 0 },
    upgrades: {
      crit: 0,
      attack: 1,
      maxBallBonus: 0,
      bomb: false,
      speed: 0,
      giantCard: 0,
      leftDrone: 0,
      rightDrone: 0,
      shields: 0,
    },
    balls: [],
    blocks: [],
    coreDrops: [],
    debuffs: [],
    projectiles: [],
    effects: [],
    texts: [],
    boss: null,
    bossIndex: 0,
    nextVlight: 0,
    nextHlight: 0,
    nextBossDebuff: 0,
    rowsTimer: 0,
    overlayMode: 'start',
    stageBossSpawnedFor: 0,
    heartRowsCounter: 0,
    dragActive: false,
    pointerX: W/2,
    shopCards: [],
  };

  const paddleScale = longScale();
  state.paddle = { x: W/2 - (CFG.basePaddleW*paddleScale)/2, y: CFG.paddleY, w: CFG.basePaddleW*paddleScale, h: CFG.basePaddleH };
  state.balls.push(makeBall(state.paddle.x + state.paddle.w/2, state.paddle.y - CFG.ballR - 2, 0, 0, true, 1));
  spawnInitialRows();
  updateHUD();
  showOverlay('start');
}

function makeBall(x,y,vx,vy,held=false,sizeMult=1){
  return {x,y,vx,vy,held,r:CFG.ballR*sizeMult,sizeMult, bombHits:0,bombReady:false};
}

function cloneBallFrom(ball, angle, speed){
  return makeBall(ball.x, ball.y, Math.cos(angle)*speed, Math.sin(angle)*speed, false, ball.sizeMult);
}

function longScale(){
  const lv = state?.coreLevels.long || 0;
  return 1 + (lv/10)*3; // lv10 => 4x
}

function triangleOutputs(){
  return 1 + (state.coreLevels.triangle||0);
}

function maxBalls(){
  const tri = state.coreLevels.triangle;
  const base = tri > 0 ? tri + 1 : 2;
  return base + state.upgrades.maxBallBonus;
}

function ballSpeed(){
  return 4.7 + state.upgrades.speed * 0.5;
}

function critChance(){ return Math.min(0.8, state.upgrades.crit * 0.05); }
function lineCount(type){
  const lv = state.coreLevels[type];
  if (lv >= 10) return 5;
  if (lv >= 7) return 4;
  if (lv >= 5) return 3;
  if (lv >= 3) return 2;
  if (lv >= 1) return 1;
  return 0;
}
function rowInterval(stage){
  if (stage >= 250) return 500;
  if (stage >= 200) return 700;
  if (stage >= 100) return 1000;
  if (stage >= 70) return 2000;
  if (stage >= 50) return 3000;
  if (stage >= 40) return 4000;
  if (stage >= 30) return 5000;
  if (stage >= 20) return 6000;
  if (stage >= 10) return 7000;
  return 8000;
}

function showOverlay(which){
  for (const k in overlays) overlays[k].classList.remove('show');
  if (which && overlays[which]) overlays[which].classList.add('show');
  state.overlayMode = which || null;
}

function addText(text,x,y,color='#fff',life=900,size=14){ state.texts.push({text,x,y,life,max:life,color,size}); }
function addEffect(obj){ state.effects.push(obj); }

function damageFloat(x,y,dmg,isCrit=false){
  addText((isCrit?'CRIT ':'') + (Math.round(dmg*100)/100), x, y, isCrit ? '#ff4d4f' : '#f8fafc', 750, isCrit?16:13);
}

function updateHUD(){
  scoreText.textContent = '점수 ' + state.score;
  stageText.textContent = 'STAGE ' + state.stage;
  heartText.textContent = '♥ ' + state.hearts;
  const c = state.coreLevels;
  const parts = [];
  if (c.triangle) parts.push('△ Lv' + c.triangle);
  if (c.long) parts.push('━ Lv' + c.long);
  if (c.vlight) parts.push('│⚡ Lv' + c.vlight);
  if (c.hlight) parts.push('─⚡ Lv' + c.hlight);
  if (!parts.length) parts.push('코어 없음');
  const fusion = [];
  if (state.upgrades.shields) fusion.push('실드 ' + state.upgrades.shields);
  if (state.upgrades.bomb) fusion.push('폭탄');
  coreText.textContent = parts.join(' · ') + (fusion.length ? ' | ' + fusion.join(' · ') : '');
  const ready = state.hearts >= 5 && state.heartsSinceShop >= 5;
  shopBtn.classList.toggle('disabled', !ready);
}

function strongestTierInfo(stage){
  if (stage === 1) return { base:1, strong:1, count:0 };
  const strong = 2 + Math.floor((stage - 2) / 6);
  const progress = ((stage - 2) % 6) + 1; //1..6
  const count = progress < 6 ? progress : CFG.cols;
  return { base: strong - 1, strong, count };
}

function makeBrick(col,rowY,hp,type='normal'){
  const x = CFG.side + col * (CFG.brickW + CFG.brickGap);
  return { x, y: rowY, w: CFG.brickW, h: CFG.brickH, hp, maxHp: hp, type };
}

function spawnRow(y, heart=false, eliteCount=0) {
  const info = strongestTierInfo(state.stage);
  const row = [];
  for (let c=0;c<CFG.cols;c++) row.push(makeBrick(c, y, info.base, 'normal'));
  let positions = [...Array(CFG.cols).keys()].sort(() => Math.random() - 0.5);
  for (let i=0;i<Math.min(info.count, CFG.cols);i++) row[positions[i]].hp = row[positions[i]].maxHp = info.strong;
  if (heart) {
    const idx = positions[CFG.cols-1] ?? Math.floor(Math.random()*CFG.cols);
    row[idx].type = 'heart';
    row[idx].hp = row[idx].maxHp = Math.max(1, info.base);
  }
  if (eliteCount > 0) {
    const pos2 = [...Array(CFG.cols).keys()].sort(() => Math.random() - 0.5).slice(0, eliteCount);
    for (const idx of pos2) {
      row[idx].type = 'elite';
      row[idx].hp = row[idx].maxHp = Math.max(info.strong, info.base + 1);
    }
  }
  state.blocks.push(...row);
}

function spawnInitialRows(){
  const rows = 6;
  for (let i=0;i<rows;i++) {
    const y = CFG.topMargin + i * CFG.rowPitch;
    spawnRow(y, i===0, 0);
  }
}

function addTopRow(){
  for (const b of state.blocks) b.y += CFG.rowPitch;
  if (state.boss) state.boss.y += CFG.rowPitch;
  state.rowsAdded++;
  state.heartRowsCounter++;
  let heart = false;
  if (state.heartRowsCounter >= CFG.heartEveryRows) {
    heart = true;
    state.heartRowsCounter = 0;
  }
  spawnRow(CFG.topMargin, heart, 0);
  if (state.blocks.some(b => b.y + b.h >= state.paddle.y - 2) || (state.boss && state.boss.y + state.boss.h >= state.paddle.y - 2)) {
    triggerGameOver();
  }
}

function spawnBossForStage(){
  if (state.stage % 10 !== 0 || state.stageBossSpawnedFor === state.stage) return;
  state.stageBossSpawnedFor = state.stage;
  state.bossIndex += 1;
  const hp = state.stage + 12; // restored from doubled to moderate original-ish
  state.boss = { x: CFG.side, y: CFG.topMargin - CFG.rowPitch*3, w: W - CFG.side*2, h: CFG.rowPitch*3 - CFG.brickGap, hp, maxHp: hp, halfTriggered:false, lastHitAt:0, debuffCount:0 };
  addText('BOSS 등장!', W/2, 160, '#fca5a5', 1200, 24);
}

function bossDebuffCount(){
  if (!state.boss || state.bossIndex < 11) return 0;
  return Math.min(10, Math.floor((state.bossIndex - 1) / 10));
}

function bossEliteCount(){
  if (state.bossIndex >= 111) return 10;
  return 5;
}

function triggerBossHalfPhase(){
  if (!state.boss || state.boss.halfTriggered) return;
  state.boss.halfTriggered = true;
  // elite blocks
  const eliteN = bossEliteCount();
  let attempts = 0;
  while (attempts < eliteN) {
    const col = Math.floor(Math.random()*CFG.cols);
    const row = Math.floor(Math.random()*5) + 1;
    const y = CFG.topMargin + row*CFG.rowPitch;
    const existing = state.blocks.find(b => Math.abs(b.x - (CFG.side + col*(CFG.brickW+CFG.brickGap))) < 1 && Math.abs(b.y - y) < 1);
    if (!existing) {
      const info = strongestTierInfo(state.stage);
      const hp = info.strong + Math.floor(state.stage/12);
      state.blocks.push({x: CFG.side + col*(CFG.brickW+CFG.brickGap), y, w: CFG.brickW, h: CFG.brickH, hp, maxHp: hp, type:'elite'});
      attempts++;
    } else { attempts++; }
  }
  addText('보스 분노!', W/2, 170, '#fb7185', 1400, 24);
  state.nextBossDebuff = 0;
}

function spawnDebuffBurst(){
  const count = bossDebuffCount();
  if (!count) return;
  for (let i=0;i<count;i++) {
    state.debuffs.push({ x: 30 + Math.random()*(W-60), y: 80 + Math.random()*40, vy: 2 + Math.random()*0.8, size: 15 });
  }
  addText('디버프 x' + count, W/2, 110, '#f87171', 900, 16);
}

function coreTypeName(type){ return ({triangle:'세모',long:'긴패들',vlight:'세로번개',hlight:'가로번개'})[type]||type; }

function spawnCoreDrop(x,y){
  const types = ['triangle','long','vlight','hlight'];
  const type = types[(Math.random()*types.length)|0];
  state.coreDrops.push({ x, y, vx: (Math.random()*2-1)*1.6, vy: CFG.coreDropVy + Math.random()*0.5, size: 18, type, collectDelay: 220 });
}

function gainCore(type){
  if (state.coreLevels[type] >= CFG.coreMaxLv) {
    addText('MAX', state.paddle.x + state.paddle.w/2, state.paddle.y - 18, '#7dd3fc', 700, 14);
    return;
  }
  state.coreLevels[type] += 1;
  if (type === 'long') state.paddle.w = CFG.basePaddleW * longScale();
  updateHUD();
  const label = state.coreLevels[type] === 1 ? 'NEW' : 'Lv Up';
  addText(label, state.paddle.x + state.paddle.w/2, state.paddle.y - 20, '#7dd3fc', 800, 16);
  addEffect({type:'flash', t:0, dur:220});
}

function lowerRandomCore(){
  const keys = Object.keys(state.coreLevels).filter(k => state.coreLevels[k] > 0);
  if (!keys.length) return false;
  const k = keys[(Math.random()*keys.length)|0];
  state.coreLevels[k]--;
  if (k === 'long') state.paddle.w = CFG.basePaddleW * longScale();
  updateHUD();
  addText(coreTypeName(k)+' Lv Down', W/2, state.paddle.y - 24, '#f87171', 900, 16);
  return true;
}

function damageBoss(amount, x, y){
  const now = performance.now();
  if (!state.boss || now - state.boss.lastHitAt < 55) return false;
  state.boss.lastHitAt = now;
  state.boss.hp -= amount;
  damageFloat(x, y, amount, false);
  if (!state.boss.halfTriggered && state.boss.hp <= state.boss.maxHp * 0.5) triggerBossHalfPhase();
  if (state.boss.hp <= 0) {
    state.hearts += 3; state.heartsSinceShop += 3;
    addText('+3 ♥', W/2, 140, '#fb7185', 1200, 20);
    state.boss = null;
    updateHUD();
  }
  return true;
}

function tryCrit(){ return Math.random() < critChance(); }

function hitBrick(brick, damage, ball){
  if (!brick) return;
  const isCrit = tryCrit();
  const dealt = damage * (isCrit ? 2 : 1);
  brick.hp -= dealt;
  damageFloat(ball.x, ball.y, dealt, isCrit);
  if (brick.type === 'heart' && brick.hp <= 0) {
    state.hearts += 1;
    state.heartsSinceShop += 1;
    addText('+1 ♥', brick.x+brick.w/2, brick.y+brick.h/2, '#fb7185', 1000, 16);
    addEffect({type:'heartBurst', x:brick.x+brick.w/2, y:brick.y+brick.h/2, t:0, dur:550});
    updateHUD();
  }
  if (brick.hp <= 0) {
    removeBlock(brick);
    if (Math.random() < CFG.coreDropChance && brick.type !== 'heart' && brick.type !== 'elite') spawnCoreDrop(brick.x + brick.w/2, brick.y + brick.h/2);
  }
}

function removeBlock(brick){
  const idx = state.blocks.indexOf(brick);
  if (idx >= 0) state.blocks.splice(idx,1);
  state.score += 1;
  state.destroyedTotal += 1;
  state.killsInStage += 1;
  if (state.killsInStage >= 20) {
    state.killsInStage = 0;
    state.stage += 1;
    addText('STAGE ' + state.stage, W/2, 150, '#f8fafc', 900, 20);
    spawnBossForStage();
  }
  updateHUD();
}

function explodeAt(x,y){
  addEffect({type:'explosion', x,y, t:0, dur:500});
  addText('BOOM!', x, y, '#f59e0b', 700, 18);
  for (const b of [...state.blocks]) {
    const cx = b.x + b.w/2, cy = b.y + b.h/2;
    if (Math.hypot(cx-x, cy-y) < 72) {
      b.hp -= 2;
      damageFloat(cx, cy, 2, false);
      if (b.type === 'heart' && b.hp <= 0) {
        state.hearts += 1; state.heartsSinceShop += 1; updateHUD(); addText('+1 ♥', cx, cy, '#fb7185', 900, 16);
      }
      if (b.hp <= 0) removeBlock(b);
    }
  }
}

function openShop(){
  if (state.gameOver) return;
  if (!(state.hearts >= 5 && state.heartsSinceShop >= 5)) return;
  state.paused = true;
  state.shopCards = rollShopCards();
  renderShopCards();
  showOverlay('shop');
}

function closeShop(consumed=false){
  if (state.overlayMode !== 'shop') return;
  state.heartsSinceShop = 0;
  updateHUD();
  state.paused = false;
  showOverlay(null);
}

function toggleStatus(force){
  const open = force===undefined ? state.overlayMode !== 'status' : force;
  if (open) {
    renderStatus();
    state.paused = true;
    showOverlay('status');
  } else {
    state.paused = false;
    showOverlay(null);
  }
}

function rollShopCards(){
  const pool5 = [
    {price:5,name:'치명타 +5%',desc:'치명타 확률 +5%',delta:()=>'현재 ' + (state.upgrades.crit*5) + '% → ' + ((state.upgrades.crit+1)*5) + '%',apply:()=>state.upgrades.crit+=1},
    {price:5,name:'공격력 +0.25',desc:'공 기본 데미지 +0.25',delta:()=>'현재 ' + state.upgrades.attack.toFixed(2) + ' → ' + (state.upgrades.attack+0.25).toFixed(2),apply:()=>state.upgrades.attack+=0.25},
    {price:5,name:'최대 공 +1 (25%)',desc:'25% 확률로 최대 공 한도 +1',delta:()=>'현재 ' + maxBalls() + ' → ? ',apply:()=>{ if (Math.random()<0.25){ state.upgrades.maxBallBonus += 1; addText('최대 공 증가!', W/2, state.paddle.y - 36, '#7dd3fc', 900, 16); } else { addText('꽝!', W/2, state.paddle.y - 36, '#f8fafc', 700, 16); } }},
  ];
  const pool10 = [
    {price:10,name:'폭탄',desc:'5번 패들 반사마다 1회 폭발',delta:()=>(state.upgrades.bomb?'이미 장착':'새 효과'),apply:()=>state.upgrades.bomb=true},
    {price:10,name:'거대 공',desc:'랜덤 공 1개를 2배\n모두 크면 랜덤 1개를 3배',delta:()=>'현재 공 강화',apply:()=>applyGiantBall()},
    {price:10,name:'속도 +0.5',desc:'공 이동속도 증가',delta:()=>'현재 ' + ballSpeed().toFixed(1) + ' → ' + (ballSpeed()+0.5).toFixed(1),apply:()=>state.upgrades.speed+=1},
  ];
  const pool15 = [
    {price:15,name:'뿅뿅이',desc:'왼쪽 드론 미사일 +0.5',delta:()=>'Lv ' + state.upgrades.leftDrone + ' → ' + (state.upgrades.leftDrone+1),apply:()=>state.upgrades.leftDrone+=1},
    {price:15,name:'뾱뾱이',desc:'오른쪽 드론 미사일 +0.5',delta:()=>'Lv ' + state.upgrades.rightDrone + ' → ' + (state.upgrades.rightDrone+1),apply:()=>state.upgrades.rightDrone+=1},
    {price:15,name:'실드 +1',desc:'보스 디버프 1회 방어',delta:()=>'현재 ' + state.upgrades.shields + ' → ' + Math.min(10,state.upgrades.shields+1),apply:()=>state.upgrades.shields=Math.min(10,state.upgrades.shields+1)},
  ];
  const groups=[pool5,pool10,pool15];
  const cards=[];
  for(let i=0;i<3;i++){
    const g=groups[(Math.random()*groups.length)|0];
    cards.push(g[(Math.random()*g.length)|0]);
  }
  return cards;
}

function renderShopCards(){
  cardsBox.innerHTML='';
  state.shopCards.forEach((card,idx)=>{
    const affordable = state.hearts >= card.price;
    const el = document.createElement('div');
    el.className = 'card' + (affordable ? '' : ' off');

    const btn=document.createElement('button'); btn.className='buy'; btn.textContent='구매'; btn.disabled=!affordable;
    btn.onclick=()=>{ if(state.hearts<card.price)return; state.hearts-=card.price; card.apply(); updateHUD(); closeShop(true); };
    el.appendChild(btn); cardsBox.appendChild(el);
  });
}

function renderStatus(){

  const items = [

  ];

function applyGiantBall(){
  if (!state.balls.length) return;
  const tier2 = state.balls.filter(b => b.sizeMult >= 2).length;
  if (tier2 < state.balls.length) {
    const pool = state.balls.filter(b => b.sizeMult < 2);
    const b = pool[(Math.random()*pool.length)|0];
    b.sizeMult = 2; b.r = CFG.ballR*2;
    addText('거대 공!', b.x, b.y, '#fbbf24', 900, 16);
  } else {
    const b = state.balls[(Math.random()*state.balls.length)|0];
    b.sizeMult = Math.max(b.sizeMult, 3); b.r = CFG.ballR*b.sizeMult;
    addText('초거대 공!', b.x, b.y, '#f59e0b', 900, 16);
  }
}

function launchHeldBalls(targetX, targetY){
  const held = state.balls.filter(b=>b.held);
  if (!held.length) return;
  const originX = state.paddle.x + state.paddle.w/2;
  const originY = state.paddle.y;
  const dx = targetX - originX;
  let dy = targetY - originY; if (dy > -20) dy = -20;
  const len = Math.hypot(dx,dy)||1; const sp = ballSpeed();
  if (held.length === 1) {
    held[0].held=false; held[0].vx = dx/len*sp; held[0].vy = dy/len*sp;
  } else {
    const spread = Math.min(Math.PI/2.8, 0.2 + held.length*0.08);
    for (let i=0;i<held.length;i++) {
      const t = held.length===1?0.5:i/(held.length-1);
      const ang = Math.atan2(dy,dx) - spread/2 + spread*t;
      held[i].held=false; held[i].vx=Math.cos(ang)*sp; held[i].vy=Math.sin(ang)*sp;
    }
  }
  state.running = true; showOverlay(null);
}

function movePaddle(clientX){
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left) * (W / rect.width);
  state.paddle.x = Math.max(0, Math.min(W - state.paddle.w, x - state.paddle.w/2));
  for (const b of state.balls) if (b.held){ b.x = state.paddle.x + state.paddle.w/2; b.y = state.paddle.y - b.r - 2; }
}

function triggerGameOver(){
  if (state.gameOver) return;
  state.gameOver = true;
  state.running = false;
  state.paused = true;
  state.gameOverPhase = 1;
  messageTitle.textContent = '게임 오버';
  messageBody.textContent = '당신은 유미에게 ' + Math.floor(state.score/20) + '번 사랑한다고 말했습니다!\n탭해서 계속';
  showOverlay('msg');
}

function handleOverlayTap(){
  if (state.overlayMode === 'start') {
    showOverlay(null); state.running = true; state.paused = false; return;
  }
  if (state.overlayMode === 'msg') {
    if (state.gameOverPhase === 1) {
      state.gameOverPhase = 2;
      messageTitle.textContent = '유미야 사랑해!';
      messageBody.textContent = '더 많이 사랑을 고백해보세요!\n다시 탭하면 새 게임';
      return;
    }
    resetState();
    return;
  }
}

function pointInRect(x,y,r){ return x >= r.x && x <= r.x+r.w && y >= r.y && y <= r.y+r.h; }

function onTap(clientX, clientY){
  if (state.overlayMode === 'shop' || state.overlayMode === 'status') return;
  if (state.overlayMode === 'start' || state.overlayMode === 'msg') { handleOverlayTap(); return; }
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left) * (W / rect.width);
  const y = (clientY - rect.top) * (H / rect.height);
  if (state.balls.some(b=>b.held)) launchHeldBalls(x,y);
}

function spawnProjectile(fromX, fromY, angle, power){
  const sp = 6.5;
  state.projectiles.push({x:fromX,y:fromY,vx:Math.cos(angle)*sp,vy:Math.sin(angle)*sp,r:4,damage:0.5+power*0.5});
}

let droneSweep = 0;

function update(dt){
  if (state.paused || state.gameOver) return;
  if (state.running) {
    state.rowsTimer += dt;
    const interval = rowInterval(state.stage);
    while (state.rowsTimer >= interval) {
      state.rowsTimer -= interval;
      addTopRow();
    }
  }

  const now = performance.now();
  if (state.running && state.coreLevels.vlight && now >= state.nextVlight) { fireLine('vlight'); state.nextVlight = now + CFG.coreLineInterval; }
  if (state.running && state.coreLevels.hlight && now >= state.nextHlight) { fireLine('hlight'); state.nextHlight = now + CFG.coreLineInterval; }

  if (state.boss && state.boss.halfTriggered && bossDebuffCount() > 0 && now >= state.nextBossDebuff) {
    spawnDebuffBurst();
    state.nextBossDebuff = now + CFG.bossDebuffInterval;
  }

  // drones
  droneSweep += dt * 0.0018;
  if (state.running && (state.upgrades.leftDrone || state.upgrades.rightDrone)) {
    if (!state.nextDroneFire) state.nextDroneFire = 0;
    state.nextDroneFire -= dt;
    if (state.nextDroneFire <= 0) {
      state.nextDroneFire = 550;
      const swing = Math.sin(droneSweep) * (Math.PI/4);
      if (state.upgrades.leftDrone) spawnProjectile(state.paddle.x + state.paddle.w*0.35, state.paddle.y - 20, -Math.PI/2 + swing, state.upgrades.leftDrone);
      if (state.upgrades.rightDrone) spawnProjectile(state.paddle.x + state.paddle.w*0.65, state.paddle.y - 20, -Math.PI/2 - swing, state.upgrades.rightDrone);
    }
  }

  // projectiles
  for (const p of [...state.projectiles]) {
    p.x += p.vx; p.y += p.vy;
    if (state.boss && pointInRect(p.x,p.y,{x:state.boss.x,y:state.boss.y,w:state.boss.w,h:state.boss.h})) {
      damageBoss(p.damage, p.x, p.y); state.projectiles.splice(state.projectiles.indexOf(p),1); continue;
    }
    let hit = null;
    for (const b of state.blocks) if (pointInRect(p.x,p.y,b)) { hit = b; break; }
    if (hit) { hitBrick(hit,p.damage,{x:p.x,y:p.y}); state.projectiles.splice(state.projectiles.indexOf(p),1); continue; }
    if (p.x<0||p.x>W||p.y<0||p.y>H) state.projectiles.splice(state.projectiles.indexOf(p),1);
  }

  // debuffs
  for (const d of [...state.debuffs]) {
    d.y += d.vy;
    if (d.y > H + 20) { state.debuffs.splice(state.debuffs.indexOf(d),1); continue; }
    if (d.y + d.size >= state.paddle.y && d.x >= state.paddle.x && d.x <= state.paddle.x + state.paddle.w) {
      if (state.upgrades.shields > 0) { state.upgrades.shields--; addText('SHIELD!', d.x, d.y, '#93c5fd', 900, 16); }
      else { lowerRandomCore(); }
      state.debuffs.splice(state.debuffs.indexOf(d),1); updateHUD();
    }
  }

  // core drops
  for (const it of [...state.coreDrops]) {
    it.collectDelay -= dt;
    it.x += it.vx; it.y += it.vy;
    if (it.x < it.size/2 || it.x > W-it.size/2) { it.vx *= -1; it.x = Math.max(it.size/2, Math.min(W-it.size/2, it.x)); }
    if (it.y > H + 24) { state.coreDrops.splice(state.coreDrops.indexOf(it),1); continue; }
    if (it.collectDelay <= 0 && it.y + it.size >= state.paddle.y && it.x >= state.paddle.x && it.x <= state.paddle.x + state.paddle.w) {
      gainCore(it.type); state.coreDrops.splice(state.coreDrops.indexOf(it),1);
    }
  }

  // balls
  for (const ball of [...state.balls]) {
    if (ball.held) { ball.x = state.paddle.x + state.paddle.w/2; ball.y = state.paddle.y - ball.r - 2; continue; }
    ball.x += ball.vx; ball.y += ball.vy;
    if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.vx *= -1; }
    if (ball.x + ball.r >= W) { ball.x = W-ball.r; ball.vx *= -1; }
    if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.vy *= -1; }
    if (ball.y - ball.r > H + 40) { state.balls.splice(state.balls.indexOf(ball),1); if (!state.balls.length) triggerGameOver(); continue; }

    // paddle
    const pr = {x:state.paddle.x, y:state.paddle.y, w:state.paddle.w, h:state.paddle.h};
    if (circleRect(ball, pr) && ball.vy > 0) {
      ball.bombHits += 1;
      if (state.upgrades.bomb && ball.bombHits >= 5) {
        ball.bombReady = true;
        ball.bombHits = 5;
        addText('폭탄 준비!', ball.x, ball.y-16, '#f59e0b', 600, 13);
      }
      const rel = (ball.x - (state.paddle.x + state.paddle.w/2)) / (state.paddle.w/2);
      const baseAngle = -Math.PI/2 + rel * 0.9;
      const desired = triangleOutputs();
      const cap = maxBalls();
      if (state.coreLevels.triangle > 0 && state.balls.length < cap) {
        const possible = Math.min(desired, cap - (state.balls.length - 1));
        const sp = ballSpeed();
        const arr = [];
        const spread = Math.min(1.8, 0.35 + possible*0.08);
        for (let i=0;i<possible;i++) {
          const t = possible===1?0.5:i/(possible-1);
          const ang = baseAngle - spread/2 + spread*t;
          arr.push(cloneBallFrom(ball, ang, sp));
        }
        const idx = state.balls.indexOf(ball); if (idx>=0) state.balls.splice(idx,1);
        state.balls.push(...arr);
        continue;
      } else {
        const sp = ballSpeed();
        ball.vx = Math.cos(baseAngle) * sp; ball.vy = Math.sin(baseAngle) * sp; ball.y = state.paddle.y - ball.r - 1;
      }
    }

    // boss collision
    if (state.boss && circleRect(ball, {x:state.boss.x,y:state.boss.y,w:state.boss.w,h:state.boss.h})) {
      const dmg = state.upgrades.attack;
      const was = damageBoss(dmg, ball.x, ball.y);
      if (ball.bombReady) { explodeAt(ball.x, ball.y); ball.bombReady = false; ball.bombHits = 0; }
      // bounce
      if (ball.y < state.boss.y + 8 || ball.y > state.boss.y + state.boss.h - 8) ball.vy *= -1;
      else ball.vx *= -1;
      continue;
    }

    // bricks
    let hitBrickObj = null;
    for (const b of state.blocks) if (circleRect(ball,b)) { hitBrickObj = b; break; }
    if (hitBrickObj) {
      hitBrick(hitBrickObj, state.upgrades.attack, ball);
      if (ball.bombReady) { explodeAt(ball.x, ball.y); ball.bombReady=false; ball.bombHits=0; }
      // bounce estimate
      const cx = hitBrickObj.x + hitBrickObj.w/2, cy = hitBrickObj.y + hitBrickObj.h/2;
      const dx = ball.x - cx, dy = ball.y - cy;
      if (Math.abs(dx/hitBrickObj.w) > Math.abs(dy/hitBrickObj.h)) ball.vx *= -1; else ball.vy *= -1;
    }
  }

  // float texts/effects
  for (const t of [...state.texts]) { t.life -= dt; t.y -= dt*0.02; if (t.life<=0) state.texts.splice(state.texts.indexOf(t),1); }
  for (const e of [...state.effects]) { e.t += dt; if (e.t >= e.dur) state.effects.splice(state.effects.indexOf(e),1); }
}

function fireLine(type){
  const count = lineCount(type); if (!count) return;
  const used = new Set();
  for (let i=0;i<count;i++) {
    let idx = 0;
    do { idx = (Math.random()*CFG.cols)|0; } while (used.has(idx) && used.size < CFG.cols);
    used.add(idx);
    if (type === 'vlight') {
      const x = CFG.side + idx*(CFG.brickW+CFG.brickGap) + CFG.brickW/2;
      addEffect({type:'vline',x,t:0,dur:280});
      for (const b of [...state.blocks]) {
        if (x >= b.x && x <= b.x+b.w) { b.hp -= 1; damageFloat(x, b.y+b.h/2, 1, false); if (b.type==='heart' && b.hp<=0){state.hearts++;state.heartsSinceShop++;updateHUD();addText('+1 ♥',x,b.y,'#fb7185',900,16);} if (b.hp<=0) removeBlock(b); }
      }
      if (state.boss && x >= state.boss.x && x <= state.boss.x+state.boss.w) damageBoss(1, x, state.boss.y + state.boss.h/2);
    } else {
      const possibleRows = [...new Set(state.blocks.map(b => b.y))];
      if (!possibleRows.length) continue;
      const y = possibleRows[(Math.random()*possibleRows.length)|0] + CFG.brickH/2;
      addEffect({type:'hline',y,t:0,dur:280});
      for (const b of [...state.blocks]) {
        if (y >= b.y && y <= b.y+b.h) { b.hp -= 1; damageFloat(b.x+b.w/2, y, 1, false); if (b.type==='heart' && b.hp<=0){state.hearts++;state.heartsSinceShop++;updateHUD();addText('+1 ♥',b.x,y,'#fb7185',900,16);} if (b.hp<=0) removeBlock(b); }
      }
      if (state.boss && y >= state.boss.y && y <= state.boss.y+state.boss.h) damageBoss(1, state.boss.x+state.boss.w/2, y);
    }
  }
  updateHUD();
}

function circleRect(ball, rect){
  const cx = Math.max(rect.x, Math.min(ball.x, rect.x+rect.w));
  const cy = Math.max(rect.y, Math.min(ball.y, rect.y+rect.h));
  const dx = ball.x - cx, dy = ball.y - cy;
  return dx*dx + dy*dy <= ball.r*ball.r;
}

function drawBrick(b){
  let fill = '#334155';
  if (b.type==='heart') fill = '#fb7185';
  else if (b.type==='elite') fill = '#8b5cf6';
  else {
    const hue = (state.stage*13 + b.maxHp*18) % 360;
    fill = 'hsl(' + hue + ' 65% 58%)';
  }
  rr(b.x,b.y,b.w,b.h,6,fill,'rgba(255,255,255,.16)');
  if (b.type==='heart') {
    ctx.fillStyle = '#fff'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center'; ctx.fillText('♥', b.x+b.w/2, b.y+b.h/2+5);
  } else {
    ctx.fillStyle = '#0f172a'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center'; ctx.fillText(String(Math.max(1,Math.ceil(b.hp))), b.x+b.w/2, b.y+b.h/2+5);
  }
}

function rr(x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fillStyle=fill; ctx.fill(); if(stroke){ctx.strokeStyle=stroke; ctx.stroke();}
}

function drawEffects(){
  for (const e of state.effects) {
    const p = e.t/e.dur;
    if (e.type==='flash') {
      ctx.fillStyle = 'rgba(125,211,252,' + (0.18*(1-p)) + ')'; ctx.fillRect(0,0,W,H);
    } else if (e.type==='heartBurst') {
      for (let i=0;i<8;i++){
        const a = (Math.PI*2/8)*i + p*2; const r = 10 + p*22;
        ctx.fillStyle = 'rgba(251,113,133,' + (1-p) + ')';
        ctx.beginPath(); ctx.arc(e.x + Math.cos(a)*r, e.y + Math.sin(a)*r, 3*(1-p)+1, 0, Math.PI*2); ctx.fill();
      }
    } else if (e.type==='explosion') {
      ctx.strokeStyle = 'rgba(245,158,11,' + (1-p) + ')'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(e.x,e.y,18+p*42,0,Math.PI*2); ctx.stroke();
    } else if (e.type==='vline') {
      ctx.strokeStyle='rgba(56,189,248,' + (1-p) + ')'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(e.x, CFG.topMargin); ctx.lineTo(e.x, H-40); ctx.stroke();
    } else if (e.type==='hline') {
      ctx.strokeStyle='rgba(56,189,248,' + (1-p) + ')'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(CFG.side, e.y); ctx.lineTo(W-CFG.side, e.y); ctx.stroke();
    }
  }
}

function drawBoss(){
  const b = state.boss; if (!b) return;
  rr(b.x,b.y,b.w,b.h,10,'#991b1b','rgba(255,255,255,.2)');
  const hpP = Math.max(0,b.hp/b.maxHp);
  // cracks
  ctx.strokeStyle='rgba(255,255,255,' + (0.2 + (1-hpP)*0.5) + ')'; ctx.lineWidth=2;
  for (let i=0;i<Math.floor((1-hpP)*8);i++){
    const sx = b.x + 20 + i*35, sy = b.y + 20 + (i%3)*24;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx+10,sy+12); ctx.lineTo(sx-3,sy+25); ctx.stroke();
  }
  ctx.fillStyle='#fee2e2'; ctx.font='bold 30px sans-serif'; ctx.textAlign='center'; ctx.fillText('BOSS ' + state.bossIndex, W/2, b.y + b.h/2 - 8);
  ctx.font='bold 24px sans-serif'; ctx.fillText(Math.ceil(b.hp)+' / '+b.maxHp, W/2, b.y + b.h/2 + 24);
  const barW = b.w - 30, barH = 10; const bx = b.x + 15, by = b.y + 12;
  rr(bx,by,barW,barH,5,'rgba(255,255,255,.14)'); rr(bx,by,barW*hpP,barH,5,'#f87171');
}

function drawCoreDrop(it){
  ctx.save(); ctx.translate(it.x,it.y); ctx.rotate(performance.now()*0.002 + it.x*0.01);
  ctx.strokeStyle='#38bdf8'; ctx.fillStyle='rgba(56,189,248,.25)'; ctx.lineWidth=3;
  if (it.type==='triangle') {
    ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(-14,12); ctx.lineTo(14,12); ctx.closePath(); ctx.fill(); ctx.stroke();
  } else if (it.type==='long') {
    rr(-20,-8,40,16,8,'rgba(56,189,248,.35)','#38bdf8');
  } else if (it.type==='vlight') {
    ctx.beginPath(); ctx.moveTo(-6,-16); ctx.lineTo(2,-2); ctx.lineTo(-5,-2); ctx.lineTo(6,16); ctx.lineTo(0,4); ctx.lineTo(5,4); ctx.stroke();
  } else if (it.type==='hlight') {
    ctx.beginPath(); ctx.moveTo(-16,-6); ctx.lineTo(-2,2); ctx.lineTo(-2,-5); ctx.lineTo(16,6); ctx.lineTo(4,0); ctx.lineTo(4,5); ctx.stroke();
  }
  ctx.restore();
}

function drawPaddle(){
  rr(state.paddle.x, state.paddle.y, state.paddle.w, state.paddle.h, 7, '#ffffff');
  if (state.upgrades.shields > 0) {
    ctx.strokeStyle='rgba(125,211,252,.9)'; ctx.lineWidth=3;
    for (let i=0;i<Math.min(10,state.upgrades.shields);i++) {
      const py = state.paddle.y - 6 - i*3;
      ctx.beginPath(); ctx.moveTo(state.paddle.x+5,py); ctx.lineTo(state.paddle.x+state.paddle.w-5,py); ctx.stroke();
    }
  }
}

function drawBalls(){
  for (const b of state.balls) {
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fillStyle='#fbbf24'; ctx.fill();
    if (b.sizeMult >= 2) { ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=2; ctx.stroke(); }
    if (b.bombReady) { ctx.strokeStyle='rgba(245,158,11,.95)'; ctx.lineWidth=3; const pulse = 2 + Math.sin(performance.now()*0.01)*1.5; ctx.beginPath(); ctx.arc(b.x,b.y,b.r+pulse,0,Math.PI*2); ctx.stroke(); }
  }
}

function drawProjectiles(){
  ctx.fillStyle='#fca5a5';
  for (const p of state.projectiles) { ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }
}

function drawDebuffs(){
  ctx.strokeStyle='#ef4444'; ctx.lineWidth=3; ctx.fillStyle='rgba(239,68,68,.18)';
  for (const d of state.debuffs){ ctx.beginPath(); ctx.arc(d.x,d.y,d.size,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.moveTo(d.x-8,d.y-8); ctx.lineTo(d.x+8,d.y+8); ctx.moveTo(d.x+8,d.y-8); ctx.lineTo(d.x-8,d.y+8); ctx.stroke(); }
}

function drawTexts(){
  for (const t of state.texts) {
    ctx.globalAlpha = Math.max(0, t.life/t.max);
    ctx.fillStyle=t.color; ctx.font='bold '+t.size+'px sans-serif'; ctx.textAlign='center'; ctx.fillText(t.text,t.x,t.y);
    ctx.globalAlpha=1;
  }
}

function draw(){
  const g = ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0f172a'); g.addColorStop(1,'#111827'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,.04)';
  for(let y=0;y<H;y+=30){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  for (const b of state.blocks) drawBrick(b);
  drawBoss();
  drawProjectiles();
  drawDebuffs();
  for (const it of state.coreDrops) drawCoreDrop(it);
  drawPaddle();
  drawBalls();

  // drones
  if (state.upgrades.leftDrone){ ctx.fillStyle='#fb7185'; ctx.beginPath(); ctx.arc(state.paddle.x + state.paddle.w*0.25, state.paddle.y-18, 10, 0, Math.PI*2); ctx.fill(); }
  if (state.upgrades.rightDrone){ ctx.fillStyle='#fb7185'; ctx.beginPath(); ctx.arc(state.paddle.x + state.paddle.w*0.75, state.paddle.y-18, 10, 0, Math.PI*2); ctx.fill(); }

  drawEffects();
  drawTexts();

  if (!state.running && !state.gameOver && state.overlayMode===null) {
    ctx.fillStyle='rgba(255,255,255,.18)'; ctx.font='bold 22px sans-serif'; ctx.textAlign='center'; ctx.fillText('탭해서 시작', W/2, H/2);
  }
}

let last = performance.now();
function loop(now){
  const dt = Math.min(33, now-last); last=now;
  update(dt); draw(); requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

pauseBtn.onclick = () => { if (state.gameOver || state.overlayMode==='shop' || state.overlayMode==='status') return; state.paused = !state.paused; pauseBtn.textContent = state.paused ? '▶' : 'Ⅱ'; if (!state.paused && state.overlayMode===null) state.running = true; };
shopBtn.onclick = () => openShop();
statusBtn.onclick = () => toggleStatus();

canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; movePaddle(t.clientX); onTap(t.clientX, t.clientY); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; movePaddle(t.clientX); }, {passive:false});
canvas.addEventListener('mousedown', e => { movePaddle(e.clientX); onTap(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', e => { if (e.buttons===1) movePaddle(e.clientX); });

overlays.start.addEventListener('click', handleOverlayTap);
overlays.msg.addEventListener('click', handleOverlayTap);

resetState();
})();
</script>
</body>
</html>
